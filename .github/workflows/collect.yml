name: 장애인 채용공고 자동 수집

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 폴더 구조 확인
        run: find . -type f -name "*.py" | head -20

      - name: 패키지 설치
        run: |
          CRAWLER_DIR=$(find . -name "requirements.txt" | head -1 | xargs dirname)
          echo "크롤러 경로: $CRAWLER_DIR"
          cd "$CRAWLER_DIR"
          pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 크롤러 실행
        run: |
          CRAWLER_DIR=$(find . -name "main.py" | head -1 | xargs dirname)
          echo "실행 경로: $CRAWLER_DIR"
          cd "$CRAWLER_DIR"
          python main.py
        env:
          WORKNET_API_KEY:  ${{ secrets.WORKNET_API_KEY }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}

      - name: 실행 결과 요약
        if: always()
        run: echo "크롤러 실행 완료 - $(date '+%Y-%m-%d %H:%M KST')"
